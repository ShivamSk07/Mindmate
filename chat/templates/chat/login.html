<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindMate - Login</title>
    <link rel="icon" type="image/jpeg" href="/static/img/favicon.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        :root {
            --bg: #09090b;
            --surface: #141415;
            --border: #27272a;
            --text: #fafafa;
            --muted: #71717a;
            --accent-dim: #3f3f46;
            --danger: #ef4444;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        /* Desktop card */
        .card {
            width: 100%;
            max-width: 380px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px 32px;
            box-shadow: 0 20px 48px rgba(0,0,0,0.5);
            animation: fadeUp 0.4s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-text {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text);
            margin-bottom: 4px;
        }

        .heading {
            font-size: 1.45rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 4px;
        }

        .sub {
            font-size: 0.875rem;
            color: var(--muted);
            margin-bottom: 28px;
        }

        .error-msg {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            color: var(--danger);
            padding: 10px 13px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }

        .field { margin-bottom: 14px; }

        .field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .field-wrap { position: relative; }

        .field-wrap i.fi {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.8rem;
            pointer-events: none;
        }

        .field-wrap input {
            width: 100%;
            padding: 11px 12px 11px 36px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }

        .field-wrap input:focus {
            border-color: var(--accent-dim);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
        }

        .eye-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 4px 6px;
            font-size: 0.8rem;
            transition: color 0.2s;
        }
        .eye-btn:hover { color: var(--text); }

        .forgot-row {
            text-align: right;
            margin-top: 6px;
        }
        .forgot-row a {
            font-size: 0.8rem;
            color: var(--muted);
            text-decoration: none;
        }
        .forgot-row a:hover { color: var(--text); }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--text);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        .btn:hover { opacity: 0.87; }
        .btn:active { transform: scale(0.98); }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0 16px;
        }
        .divider span { flex: 1; height: 1px; background: var(--border); }
        .divider p { font-size: 0.78rem; color: var(--muted); }

        .footer-link {
            text-align: center;
            font-size: 0.85rem;
            color: var(--muted);
        }
        .footer-link a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: #1c1c1e;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            white-space: nowrap;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
        }
        .toast.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== MOBILE ===== */
        .mobile-hero {
            display: none;
        }

        @media (max-width: 850px) {
            body {
                padding: 0;
                background: var(--bg);
                flex-direction: column;
                justify-content: flex-end;
                align-items: center;
                overflow-x: hidden;
            }
            .mobile-hero {
                display: flex;
                flex: 1;
                align-items: center;
                justify-content: center;
                width: 100%;
                min-height: 250px;
            }
            .mobile-hero img {
                width: 88vw;
                height: 88vw;
                max-width: 480px;
                max-height: 480px;
                object-fit: contain;
                animation: energyGlow 10s linear infinite;
                filter: drop-shadow(0 0 15px rgba(255,255,255,0.05));
            }
            @keyframes energyGlow {
                0%   { filter: drop-shadow(0 0 10px rgba(255,255,255,0.02)) hue-rotate(0deg); transform: scale(1); }
                33%  { filter: drop-shadow(0 0 25px rgba(255,255,255,0.08)) hue-rotate(15deg); transform: scale(1.02); }
                66%  { filter: drop-shadow(0 0 15px rgba(255,255,255,0.04)) hue-rotate(-15deg); transform: scale(0.98); }
                100% { filter: drop-shadow(0 0 10px rgba(255,255,255,0.02)) hue-rotate(0deg); transform: scale(1); }
            }
            .card {
                max-width: 100%;
                border-radius: 24px 24px 0 0;
                border-bottom: none;
                padding: 32px 24px 48px;
                box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
                animation: mobileUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            }
            @keyframes mobileUp {
                from { transform: translateY(100%); }
                to   { transform: translateY(0); }
            }
        }
    </style>
</head>
<body>
    <div class="mobile-hero">
        <img src="/static/img/logo.jpeg" alt="MindMate">
    </div>

    <div class="card">
        <p class="logo-text" style="display: flex; align-items: center; gap: 8px;">
            <img src="/static/img/logo.jpeg" alt="Logo" style="width: 20px; height: 20px; border-radius: 4px; object-fit: cover;">
            MindMate
        </p>
        <h1 class="heading">Welcome back</h1>
        <p class="sub">Log in to your account</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" autocomplete="on">
            {% csrf_token %}

            <div class="field">
                <label>Username</label>
                <div class="field-wrap">
                    <i class="fas fa-user fi"></i>
                    <input type="text" name="username" placeholder="Enter username" required autocomplete="username">
                </div>
            </div>

            <div class="field">
                <label>Password</label>
                <div class="field-wrap">
                    <i class="fas fa-lock fi"></i>
                    <input type="password" name="password" id="pwd" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="eye-btn" onclick="togglePass()" id="eyeBtn" aria-label="Show password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="forgot-row">
                    <a href="javascript:void(0)" onclick="showToast()">Forgot password?</a>
                </div>
            </div>

            <button type="submit" class="btn">Continue</button>
        </form>

        <div class="divider"><span></span><p>or</p><span></span></div>

        <div class="footer-link">
            No account? <a href="{% url 'signup' %}">Sign up</a>
        </div>
    </div>

    <div class="toast" id="toast">📩 Check your email for reset instructions</div>

    <script>
        function togglePass() {
            const p = document.getElementById('pwd');
            const i = document.querySelector('#eyeBtn i');
            if (p.type === 'password') { p.type = 'text'; i.className = 'fas fa-eye-slash'; }
            else { p.type = 'password'; i.className = 'fas fa-eye'; }
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3500);
        }
    </script>
</body>
</html>
